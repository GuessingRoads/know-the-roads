
<!DOCTYPE html>
<html>
<head>
  <title>Know the Roads</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([40.09, -76.3], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    fetch('roads_manheim_named_only.geojson')
      .then(response => response.json())
      .then(data => {
        const geojsonLayer = L.geoJSON(data, {
          style: {
            color: "black",
            weight: 3
          },
          onEachFeature: function (feature, layer) {
            layer.on({
              click: function () {
                const roadName = feature.properties.name || "Unnamed Road";
                L.popup()
                  .setLatLng(layer.getBounds().getCenter())
                  .setContent(`<b>${roadName}</b>`)
                  .openOn(map);
              }
            });
          }
        }).addTo(map);

        map.on("zoomend", function () {
          const zoom = map.getZoom();
          let weight = 2;
          if (zoom >= 17) weight = 6;
          else if (zoom >= 15) weight = 4;
          else if (zoom >= 13) weight = 3;
          else weight = 2;

          geojsonLayer.setStyle({ weight });
        });
      });
  </script>
</body>
</html>
